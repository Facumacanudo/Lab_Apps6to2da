<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario_1</title>
</head>
<body>

    <main>
        <section id="container">
            <article id="cositoquesirveparahacerelform">
                <h1>Formulario basico</h1>
                <form action="datos.html" method="post">

                    <p>
                        <label for="name">Nombre y apellido:</label>
                        <input type="text" id="name" name="name" required>
                    </p>

                    <p>
                        <label for="email">Correo electrónico:</label>
                        <input type="email" id="email" name="email" required>
                    </p>

                    <p>
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" required>
                    </p>

                    <hr>

                    <label for="message">Biografía o para tirar zarasa:</label>

                    <p>
                        <textarea id="message" name="message" required></textarea>
                    </p>

                    <p>
                        <button type="submit">Registrarse :D</button>
                    </p>
                </form>

            </article>

       

        </section>

    </main>
</body>
</html>
